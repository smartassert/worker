name: build

on:
  push:
    branches:
      - master
  release:
    types:
      - published
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: Version to deploy
        required: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.service_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set env.service_version for workflow_dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "service_version=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"

      - name: Set env.service_version for release
        if: ${{ github.event_name == 'release' }}
        run: echo "service_version=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Set env.service_version for push to master or pull_request
        if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
        run: echo "service_version=master" >> "$GITHUB_ENV"

  verify-setup:
    name: Verify setup
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout bash-ga-ci-tools
        uses: actions/checkout@v6
        with:
          repository: smartassert/bash-ga-ci-tools
          path: ./vendor/smartassert/bash-ga-ci-tools
          ref: main

      - name: Output
        env:
          OUTPUTS: ${{ toJson(needs.setup.outputs) }}
        run: |
          echo "$OUTPUTS"
          ./vendor/smartassert/bash-ga-ci-tools/src/json-contains-no-empty-values.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    needs: [setup, verify-setup]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github Container Repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/smartassert/worker:${{ needs.setup.outputs.version }}

  trigger-deploy:
    name: Trigger deploy
    runs-on: ubuntu-latest
    needs: [setup, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trigger deploy workflow
        if: ${{ needs.setup.outputs.version != 'master' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_SELF }}
        run: |
          gh workflow run deploy.yml \
          -f version="${{ needs.setup.outputs.version }}"
